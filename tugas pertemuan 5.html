<!DOCTYPE html>
<html>

<head>
    <title>Creative ISE! 2025</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: #1e2a78;
            display: flex;
            justify-content: center;
        }

        .container {
            position: relative;
            width: 100%;
            max-width: 420px;
            min-height: 100vh;
            padding: 20px;
            border-radius: 20px;
            background: linear-gradient(180deg, #5aa6b8, #1e3c8f);
            box-sizing: border-box;
            color: white;
            text-align: center;
            margin: 0 auto;
        }

        .top-bar {
            position: absolute;
            top: 20px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 20px;
            box-sizing: border-box;
        }

        .top-icon {
            width: 32px;
            height: 32px;
            background: rgba(255, 255, 255, 0.6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .top-icon img {
            width: 16px;
            height: 16px;
        }

        .profile-logo {
            width: 96px;
            height: 96px;
            border-radius: 50%;
            object-fit: cover;
            margin: 70px auto 10px;
            display: block;
        }

        .title {
            margin: 10px 0;
            font-size: 20px;
        }

        .section-label {
            margin: 20px 0 10px;
            font-size: 14px;
            opacity: 0.9;
        }

        .link-button {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1.5px solid rgba(255, 255, 255, 0.7);
            padding: 14px 18px;
            border-radius: 999px;
            margin-bottom: 12px;
            color: white;
            text-decoration: none;
            font-size: 14px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(4px);
        }

        .link-text {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
        }

        .link-left img {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            object-fit: cover;
        }

        .footer-button {
            margin: 40px auto 10px;
            background: white;
            color: black;
            padding: 10px 16px;
            border-radius: 20px;
            display: inline-block;
            font-size: 13px;
            font-weight: bold;
            text-decoration: none;
        }

        .footer-text {
            font-size: 10px;
            opacity: 0.7;
        }

        .footer-text a {
            color: white;
            text-decoration: none;
            margin: 0 2px;
        }

        .footer-text a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <div class="container">

        <!-- top bar -->
        <div class="top-bar">

            <!-- icon kiri -->
            <a class="top-icon" href="#" target="_blank">
                <img src="linktree icon.png">
            </a>

            <!-- icon kanan -->
            <a class="top-icon" href="#" target="_blank">
                <img src="share icon.png">
            </a>

        </div>

        <!-- logo -->
        <img class="profile-logo" src="logo ise!.png">

        <!-- title -->
        <div class="title">Creative ISE! 2025</div>

        <!-- section -->
        <div class="section-label">Essential Guide 📦</div>

        <a class="link-button" href="#" target="_blank">
            <div class="link-left"></div>
            <div class="link-text">GSM 2025</div>
            <div>⋮</div>
        </a>

        <a class="link-button" href="#" target="_blank">
            <div class="link-left"></div>
            <div class="link-text">Moodboard 🎨</div>
            <div>⋮</div>
        </a>

        <a class="link-button" href="#" target="_blank">
            <div class="link-left">
                <img src="lyno pic.png">
            </div>
            <div class="link-text">Lyno Font Download</div>
            <div>⋮</div>
        </a>

        <!-- section -->
        <div class="section-label">Documents 📄</div>

        <a class="link-button" href="#" target="_blank">
            <div class="link-left">
                <img src="SOP img.png">
            </div>
            <div class="link-text">SOP Request ISE! 2025</div>
            <div>⋮</div>
        </a>

        <a class="link-button" href="#" target="_blank">
            <div class="link-left">
                <img src="job img.png">
            </div>
            <div class="link-text">Tracking Job</div>
            <div>⋮</div>
        </a>

        <!-- footer button -->
        <a class="footer-button" href="#" target="_blank">
            Join CreativeISE25 on Linktree
        </a>

        <!-- footer links -->
        <div class="footer-text">
            <a href="#">Cookie Preferences</a> •
            <a href="#">Report</a> •
            <a href="#">Privacy</a> •
            <a href="#">Explore</a>
        </div>

    </div>

</body>

</html>
